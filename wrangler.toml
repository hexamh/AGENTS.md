name = "agentsmd"
main = "src/index.ts"
compatibility_date = "2026-02-01"
compatibility_flags = ["nodejs_compat"]

[[kv_namespaces]]
binding = "SESSIONS"
id = "YOUR_KV_NAMESPACE_ID"      # Replace after: wrangler kv namespace create SESSIONS
preview_id = "YOUR_PREVIEW_KV_ID" # Replace after: wrangler kv namespace create SESSIONS --preview

[vars]
ENVIRONMENT = "production"
BOT_NAME = "AgentsMD Bot"

# Secrets (set via: wrangler secret put <KEY>)
# TELEGRAM_BOT_TOKEN  - Your Telegram Bot token from @BotFather
# ANTHROPIC_API_KEY   - Your Anthropic Claude API key
# WEBHOOK_SECRET      - Random string for Telegram webhook verification
